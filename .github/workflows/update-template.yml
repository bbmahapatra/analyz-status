name: Update Template CI
permissions:
  contents: write
  workflows: write
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [update_template]
  workflow_dispatch:

jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    concurrency:
      group: master-branch
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Pull latest master
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git pull --rebase origin master

      - name: Update template (without push)
        uses: upptime/uptime-monitor@master
        with:
          command: "update-template"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          NO_PUSH: "true"

      - name: Commit and push changes
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add .
          git commit -m "Template update" || echo "No changes"
          git pull --rebase origin master
          git push --force-with-lease origin master