name: Static Site CI
on:
  schedule:
    - cron: "0 1 * * *"
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:

jobs:
  release:
    name: Build and deploy site
    concurrency:
      group: master-branch
      cancel-in-progress: false
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
          fetch-depth: 0

      - name: Pull latest master
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git pull --rebase origin master

      - name: Generate site (without pushing)
        uses: upptime/uptime-monitor@v1.41.3
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          NO_PUSH: "true"           # prevents upptime from pushing

      - name: Commit and push changes
        run: |
          git config user.name "Upptime Bot"
          git config user.email "73812536+upptime-bot@users.noreply.github.com"
          git add .
          git commit -m "Static site update" || echo "No changes to commit"
          git pull --rebase origin master   # one more safety pull
          git push --force-with-lease origin master

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: false
          force: true
          user_name: "Upptime Bot"
          user_email: "73812536+upptime-bot@users.noreply.github.com"